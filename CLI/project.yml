name: CLI
options:
  bundleIdPrefix: dev.friquelme
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Core:
    path: ../Core

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  shot:
    type: tool
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_NAME: shot
        PRODUCT_BUNDLE_IDENTIFIER: dev.friquelme.shotfuse.cli
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: Core
